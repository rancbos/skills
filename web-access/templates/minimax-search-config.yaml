# MiniMax MCP Search — config.yaml 模板
# 验证时间：2026-05-26
# 包：minimax-coding-plan-mcp（安装路径）
#   /root/.hermes/node/node_modules/minimax-coding-plan-mcp/dist/stdio.js
#
# ⚠️ 环境变量映射陷阱：
#   MCP 内部读取固定名 MINIMAX_API_KEY
#   .env 中变量名是 MINIMAX_CN_API_KEY
#   必须通过 env{} 中写 MINIMAX_CN_API_KEY: ${MINIMAX_CN_API_KEY}
#   让 Hermes 在运行时把 MINIMAX_CN_API_KEY 的值注入为 MINIMAX_API_KEY
#   如果直接 env: { MINIMAX_API_KEY: ... } 而不映射，会静默失败（返回空，无报错）
#
# 重启 Hermes Agent 使配置生效。
# 工具注册名：mcp_minimax_search_web_search
#   参数：query (string) — 3-5个关键词效果最佳，中文内容优势明显

minimax-search:
  command: /root/.hermes/node/bin/node
  args:
    - /root/.hermes/node/node_modules/minimax-coding-plan-mcp/dist/stdio.js
  env:
    MINIMAX_CN_API_KEY: ${MINIMAX_CN_API_KEY}
  timeout: 30
  connect_timeout: 15
  enabled: true